name: Build Frontend And Publish Dev Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Pack Frontend
        run: tar -czf frontend.tar.gz -C dist .

      - name: Move Dev Tag
        run: |
          git tag -f dev "$GITHUB_SHA"
          git push origin refs/tags/dev --force

      - name: Publish Dev Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view dev >/dev/null 2>&1; then
            gh release upload dev frontend.tar.gz broadcast.js --clobber
          else
            gh release create dev frontend.tar.gz broadcast.js \
              --title "dev" \
              --notes "Development build from $GITHUB_SHA" \
              --target "$GITHUB_SHA" \
              --prerelease
          fi
